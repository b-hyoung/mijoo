services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build: ./backend
    command: >
      python -c "
      from app.database import init_db;
      from app.scheduler import start_scheduler;
      import time;
      init_db();
      start_scheduler();
      print('Scheduler running...');
      [time.sleep(60) for _ in iter(int, 1)]
      "
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
